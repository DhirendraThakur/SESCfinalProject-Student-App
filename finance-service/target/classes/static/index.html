<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: #4da6ff;
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-top: 30px;
            width: 80%;
            max-width: 900px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #4da6ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #3580cc;
        }
        .account-details {
            margin-bottom: 30px;
            padding: 15px;
            border-left: 5px solid #4da6ff;
            background-color: #e9f4ff;
        }
        .status-yes { color: #d9534f; font-weight: bold; }
        .status-no { color: #5cb85c; font-weight: bold; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f9fa;
        }
        .pay-btn {
            background-color: #5cb85c;
            padding: 5px 10px;
            font-size: 14px;
        }
        .pay-btn:hover {
            background-color: #449d44;
        }
    </style>
</head>
<body>

<header>
    <h1>Finance Portal</h1>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="studentId" placeholder="Enter Student ID (e.g. test-student-001)">
        <button onclick="searchStudent()">Search</button>
    </div>

    <div id="resultArea" style="display: none;">
        <div class="account-details" id="accountInfo">
            <!-- Account Info Here -->
        </div>

        <h3>Invoices</h3>
        <table id="invoiceTable">
            <thead>
                <tr>
                    <th>Reference</th>
                    <th>Amount</th>
                    <th>Type</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="invoiceList">
                <!-- Invoices Here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    async function searchStudent() {
        const studentId = document.getElementById('studentId').value;
        if (!studentId) return;

        try {
            const accRes = await fetch(`http://localhost:8082/accounts/student/${studentId}`);
            if (!accRes.ok) throw new Error('Student account not found');
            const account = await accRes.json();

            const invRes = await fetch(`http://localhost:8082/invoices/student/${studentId}`);
            const invoices = await invRes.json();

            displayAccount(account, invoices.length);
            displayInvoices(invoices);
            document.getElementById('resultArea').style.display = 'block';
        } catch (err) {
            alert(err.message);
            document.getElementById('resultArea').style.display = 'none';
        }
    }

    function displayAccount(account, invoiceCount) {
        const info = document.getElementById('accountInfo');
        const statusClass = account.hasOutstandingBalance ? 'status-yes' : 'status-no';
        const statusText = account.hasOutstandingBalance ? 'YES' : 'NO';

        info.innerHTML = `
            <p><strong>Student ID:</strong> ${account.studentId}</p>
            <p><strong>Number of Invoices:</strong> ${invoiceCount}</p>
            <p><strong>Outstanding Balance:</strong> <span class="${statusClass}">${statusText}</span></p>
        `;
    }

    function displayInvoices(invoices) {
        const list = document.getElementById('invoiceList');
        list.innerHTML = '';

        invoices.forEach(inv => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${inv.reference}</td>
                <td>£${inv.amount.toFixed(2)}</td>
                <td>${inv.type}</td>
                <td>${inv.dueDate}</td>
                <td>${inv.status}</td>
                <td>
                    ${inv.status === 'OUTSTANDING' 
                        ? `<button class="pay-btn" onclick="payInvoice('${inv.id}')">Pay</button>` 
                        : '-'}
                </td>
            `;
            list.appendChild(row);
        });
    }

    async function payInvoice(id) {
        try {
            const res = await fetch(`http://localhost:8082/invoices/${id}/pay`, { method: 'PUT' });
            if (!res.ok) throw new Error('Payment failed');
            alert('Invoice paid successfully!');
            searchStudent();
        } catch (err) {
            alert(err.message);
        }
    }
</script>

</body>
</html>
