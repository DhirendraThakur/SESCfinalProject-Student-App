<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            margin:0;
            font-family:Arial;
            background: linear-gradient(135deg,#43e97b,#38f9d7);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card {
            background:white;
            padding:30px;
            border-radius:15px;
            width:320px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align:center;
        }

        input {
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button {
            width:100%;
            padding:10px;
            background:#4facfe;
            color:white;
            border:none;
            border-radius:5px;
        }

        button:hover {
            background:#3a8dde;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Register</h2>

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <button onclick="register()">Register</button>
</div>

<script>
    function register(){
    fetch("http://localhost:8080/api/students/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
    name:name.value,
    email:email.value,
    password:password.value,
    phone:phone.value,
    address:address.value
    })
    })
    .then(()=>{alert("Registered");window.location.href="login.html";});
    }
</script>

</body>
</html>
