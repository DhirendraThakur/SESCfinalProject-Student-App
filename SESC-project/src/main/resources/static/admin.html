<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin:0;
            font-family:'Poppins', sans-serif;
            background:#f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            width:220px;
            height:100vh;
            background:#1e293b;
            color:white;
            position:fixed;
            padding:20px;
        }
        .sidebar button {
            width:100%;
            padding:10px;
            margin:10px 0;
            background:#334155;
            border:none;
            color:white;
            cursor:pointer;
        }

        /* MAIN */
        .main {
            margin-left:240px;
            padding:20px;
        }

        /* CARD */
        .card {
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        /* TABLE */
        table {
            width:100%;
            border-collapse:collapse;
        }
        td, th {
            padding:10px;
            border-bottom:1px solid #ddd;
        }

        /* BUTTONS */
        .btn {
            padding:6px 10px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        .btn-primary { background:#3b82f6; color:white; }
        .btn-danger { background:red; color:white; }
        .btn-warning { background:orange; color:white; }

        /* BADGE */
        .badge {
            padding:5px 10px;
            border-radius:5px;
            color:white;
        }
        .available { background:green; }
        .issued { background:red; }
        .BORROWED { background:orange; }
        .RETURNED { background:green; }
        .ACTIVE { background:green; }
        .COMPLETED { background:grey; }
        .DROPPED { background:red; }

        /* MODAL */
        .modal {
            display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.5);
        }
        .modal-content {
            background:white;
            padding:20px;
            width:350px;
            margin:10% auto;
            border-radius:10px;
        }

        input, select {
            width:100%;
            padding:8px;
            margin:5px 0;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Admin</h2>
    <button onclick="showSection('students')">Students</button>
    <button onclick="showSection('library')">Library</button>
    <button onclick="showSection('courses')">Courses</button>
    <button onclick="showSection('enrolments')">Enrolments</button>
</div>

<!-- MAIN -->
<div class="main">

    <!-- STUDENTS -->
    <div id="students" class="card">
        <h3>Students</h3>
        <button class="btn btn-primary" onclick="loadStudents()">Show All Students</button>
        <table id="studentTable"></table>
    </div>

    <!-- LIBRARY -->
    <div id="library" class="card">
        <h3>Library</h3>
        <button class="btn btn-primary" onclick="openBookModal()">+ Add Book</button>
        <table id="bookTable"></table>

        <h4>Borrowed Books</h4>
        <table id="borrowTable"></table>

        <h4>Overdue Books</h4>
        <button class="btn btn-danger" onclick="loadOverdue()">Load Overdue Books</button>
        <table id="overdueTable"></table>
    </div>

    <!-- COURSES -->
    <div id="courses" class="card">
        <h3>Courses</h3>
        <button class="btn btn-primary" onclick="openCourseModal()">+ Add Course</button>
        <table id="courseTable"></table>
    </div>

    <!-- ENROLMENTS -->
    <div id="enrolments" class="card">
        <h3>Enrolments</h3>
        <table id="enrolmentTable"></table>
    </div>

</div>

<!-- ADD BOOK MODAL -->
<div class="modal" id="bookModal">
    <div class="modal-content">
        <h3>Add Book</h3>
        <input id="title" placeholder="Title">
        <input id="author" placeholder="Author">
        <button class="btn btn-primary" onclick="saveBook()">Save</button>
        <button onclick="closeBookModal()">Close</button>
    </div>
</div>

<!-- EDIT BOOK MODAL -->
<div class="modal" id="bookEditModal">
    <div class="modal-content">
        <h3>Edit Book</h3>
        <input id="bTitle" placeholder="Title">
        <input id="bAuthor" placeholder="Author">
        <button onclick="updateBook()">Update</button>
        <button onclick="closeBookEdit()">Cancel</button>
    </div>
</div>

<!-- EDIT STUDENT MODAL -->
<div class="modal" id="studentEditModal">
    <div class="modal-content">
        <h3>Edit Student</h3>
        <input id="sName" placeholder="Name">
        <input id="sEmail" placeholder="Email">
        <input id="sPhone" placeholder="Phone">
        <input id="sAddress" placeholder="Address">
        <button onclick="updateStudent()">Update</button>
        <button onclick="closeStudentModal()">Cancel</button>
    </div>
</div>

<!-- ISSUE BOOK MODAL -->
<div class="modal" id="issueModal">
    <div class="modal-content">
        <h3>Issue Book</h3>
        <select id="studentSelect"></select>
        <button onclick="confirmIssue()">Issue</button>
        <button onclick="closeIssue()">Cancel</button>
    </div>
</div>

<!-- ADD COURSE MODAL -->
<div class="modal" id="courseModal">
    <div class="modal-content">
        <h3>Add Course</h3>
        <input id="cTitle" placeholder="Title">
        <input id="cDesc" placeholder="Description">
        <input id="cCredits" type="number" placeholder="Credits">
        <input id="cDuration" type="number" placeholder="Duration (weeks)">
        <button class="btn btn-primary" onclick="saveCourse()">Save</button>
        <button onclick="closeCourseModal()">Close</button>
    </div>
</div>

<!-- EDIT COURSE MODAL -->
<div class="modal" id="courseEditModal">
    <div class="modal-content">
        <h3>Edit Course</h3>
        <input id="ecTitle" placeholder="Title">
        <input id="ecDesc" placeholder="Description">
        <input id="ecCredits" type="number" placeholder="Credits">
        <input id="ecDuration" type="number" placeholder="Duration (weeks)">
        <button class="btn btn-primary" onclick="updateCourse()">Update</button>
        <button onclick="closeCourseEdit()">Cancel</button>
    </div>
</div>

<script>

    // NAVIGATION
    function showSection(id){
        document.getElementById("students").style.display="none";
        document.getElementById("library").style.display="none";
        document.getElementById("courses").style.display="none";
        document.getElementById("enrolments").style.display="none";
        document.getElementById(id).style.display="block";
        if(id === 'enrolments') loadEnrolments();
    }
    showSection("students");

    // ================= STUDENTS =================
    let studentEditId;

    function loadStudents(){
    fetch("/api/admin/students")
    .then(res=>res.json())
    .then(data=>{
        studentTable.innerHTML="";
        studentSelect.innerHTML="";

        data.forEach(s=>{
            studentTable.innerHTML += `
            <tr>
            <td>${s.name || '<span style="color:red">Missing Name</span>'}</td>
            <td>${s.email}</td>
            <td>
            <button class="btn btn-warning" onclick="editStudent('${s.id}','${s.name || ''}','${s.email || ''}','${s.phone || ''}','${s.address || ''}')">Edit</button>
            <button class="btn btn-danger" onclick="deleteStudent('${s.id}')">Delete</button>
            </td>
            </tr>`;

            const displayName = s.name || s.email || 'Unknown';
            studentSelect.innerHTML += `<option value="${s.id}|${displayName}">${displayName}</option>`;
        });
    });
    }

    function deleteStudent(id){
    fetch(`/api/admin/students/${id}`,{method:"DELETE"})
    .then(()=>loadStudents());
    }

    function editStudent(id,name,email,phone,address){
    studentEditId=id;
    sName.value=name;
    sEmail.value=email;
    sPhone.value=phone;
    sAddress.value=address;
    studentEditModal.style.display="block";
    }

    function closeStudentModal(){
    studentEditModal.style.display="none";
    }

    function updateStudent(){
    fetch(`/api/admin/students/${studentEditId}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
    name:sName.value,
    email:sEmail.value,
    phone:sPhone.value,
    address:sAddress.value
    })
    })
    .then(()=>{
    closeStudentModal();
    loadStudents();
    });
    }

    // ================= BOOK =================
    let bookEditId;

    function openBookModal(){ bookModal.style.display="block"; }
    function closeBookModal(){ bookModal.style.display="none"; }

    function saveBook(){
    fetch("/api/admin/books",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
    title:title.value,
    author:author.value
    })
    })
    .then(()=>{
    closeBookModal();
    loadBooks();
    });
    }

    function loadBooks(){
    fetch("/api/admin/books")
    .then(res=>res.json())
    .then(data=>{
        bookTable.innerHTML="";
        data.forEach(b=>{
            bookTable.innerHTML += `
            <tr>
            <td>${b.title}</td>
            <td>${b.author}</td>
            <td>
            <span class="badge ${b.available?'available':'issued'}">
            ${b.available?'Available':'Issued'}
            </span>
            </td>
            <td>
            <button class="btn btn-warning" onclick="editBook('${b.id}','${b.title}','${b.author}')">Edit</button>
            <button class="btn btn-primary" onclick="openIssue('${b.id}','${b.title}')">Issue</button>
            <button class="btn btn-danger" onclick="deleteBook('${b.id}')">Delete</button>
            </td>
            </tr>`;
        });
    });
    }

    function deleteBook(id){
    fetch(`/api/admin/books/${id}`,{method:"DELETE"})
    .then(()=>loadBooks());
    }

    function editBook(id,titleVal,authorVal){
    bookEditId=id;
    bTitle.value=titleVal;
    bAuthor.value=authorVal;
    bookEditModal.style.display="block";
    }

    function closeBookEdit(){
    bookEditModal.style.display="none";
    }

    function updateBook(){
    fetch(`/api/admin/books/${bookEditId}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
    title:bTitle.value,
    author:bAuthor.value
    })
    })
    .then(()=>{
    closeBookEdit();
    loadBooks();
    });
    }

    // ================= ISSUE =================
    let selectedBookId, selectedBookTitle;

    function openIssue(id,title){
    selectedBookId=id;
    selectedBookTitle=title;
    issueModal.style.display="block";
    }

    function closeIssue(){
    issueModal.style.display="none";
    }

    function confirmIssue(){
    const val = studentSelect.value.split("|");

    fetch("/api/admin/borrow",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
    studentId:val[0],
    studentName:val[1],
    bookId:selectedBookId,
    bookTitle:selectedBookTitle
    })
    })
    .then(()=>{
    closeIssue();
    loadBooks();
    loadBorrow();
    });
    }

    // ================= BORROW =================
    function loadBorrow(){
    fetch("/api/admin/borrow")
    .then(res=>res.json())
    .then(data=>{
        borrowTable.innerHTML="<tr><th>Student Name</th><th>Book Title</th><th>Borrowed Date</th><th>Due Date</th><th>Status</th></tr>";
        data.forEach(b=>{
            const borrowedDate = b.borrowedAt ? new Date(b.borrowedAt).toLocaleDateString('en-GB') : '-';
            const dueDate = b.dueDate ? new Date(b.dueDate).toLocaleDateString('en-GB') : '-';
            const status = b.status || 'UNKNOWN';
            
            borrowTable.innerHTML += `
            <tr>
            <td>${b.studentName || 'Unknown'}</td>
            <td>${b.bookTitle || '-'}</td>
            <td>${borrowedDate}</td>
            <td>${dueDate}</td>
            <td><span class="badge ${status}">${status}</span></td>
            </tr>`;
        });
    });
    }

    function loadOverdue(){
    fetch("/api/admin/borrow/overdue")
    .then(res=>res.json())
    .then(data=>{
        overdueTable.innerHTML="<tr><th>Student</th><th>Book</th><th>Borrowed</th><th>Due</th><th>Days Overdue</th></tr>";
        const today = new Date();
        data.forEach(b=>{
            const dueDate = new Date(b.dueDate);
            const diffTime = today - dueDate;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const rowStyle = diffDays > 7 ? 'style="background:#ffcccc"' : '';

            overdueTable.innerHTML += `
            <tr ${rowStyle}>
            <td>${b.studentName}</td>
            <td>${b.bookTitle}</td>
            <td>${new Date(b.borrowedAt).toLocaleDateString()}</td>
            <td>${dueDate.toLocaleDateString()}</td>
            <td>${diffDays}</td>
            </tr>`;
        });
    });
    }

    // ================= COURSES =================
    let courseEditId;

    function openCourseModal() { courseModal.style.display="block"; }
    function closeCourseModal() { courseModal.style.display="none"; }

    function saveCourse(){
        fetch("/api/courses", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                title: cTitle.value,
                description: cDesc.value,
                credits: parseInt(cCredits.value),
                duration: parseInt(cDuration.value)
            })
        }).then(() => {
            closeCourseModal();
            loadCourses();
        });
    }

    function loadCourses(){
        fetch("/api/courses")
        .then(res => res.json())
        .then(data => {
            courseTable.innerHTML = "<tr><th>Title</th><th>Description</th><th>Credits</th><th>Duration</th><th>Actions</th></tr>";
            data.forEach(c => {
                courseTable.innerHTML += `
                <tr>
                    <td>${c.title}</td>
                    <td>${c.description}</td>
                    <td>${c.credits}</td>
                    <td>${c.duration} weeks</td>
                    <td>
                        <button class="btn btn-warning" onclick="editCourse('${c.id}','${c.title}','${c.description}',${c.credits},${c.duration})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteCourse('${c.id}')">Delete</button>
                    </td>
                </tr>`;
            });
        });
    }

    function deleteCourse(id){
        if(!confirm("Are you sure?")) return;
        fetch(`/api/courses/${id}`, { method: "DELETE" })
        .then(() => loadCourses());
    }

    function editCourse(id, title, desc, credits, duration){
        courseEditId = id;
        ecTitle.value = title;
        ecDesc.value = desc;
        ecCredits.value = credits;
        ecDuration.value = duration;
        courseEditModal.style.display = "block";
    }

    function closeCourseEdit() { courseEditModal.style.display = "none"; }

    function updateCourse(){
        fetch(`/api/courses/${courseEditId}`, {
            method: "PUT",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                title: ecTitle.value,
                description: ecDesc.value,
                credits: parseInt(ecCredits.value),
                duration: parseInt(ecDuration.value)
            })
        }).then(() => {
            closeCourseEdit();
            loadCourses();
        });
    }

    // ================= ENROLMENTS =================
    function loadEnrolments(){
        fetch("/api/enrolments")
        .then(res => res.json())
        .then(data => {
            enrolmentTable.innerHTML = "<tr><th>Student Name</th><th>Course Title</th><th>Enrolled Date</th><th>Status</th></tr>";
            data.forEach(e => {
                const date = new Date(e.enrolledAt).toLocaleDateString('en-GB');
                enrolmentTable.innerHTML += `
                <tr>
                    <td>${e.studentName}</td>
                    <td>${e.course ? e.course.title : 'Deleted Course'}</td>
                    <td>${date}</td>
                    <td><span class="badge ${e.status}">${e.status}</span></td>
                </tr>`;
            });
        });
    }

    // INIT
    loadStudents();
    loadBooks();
    loadBorrow();
    loadOverdue();
    loadCourses();
    loadEnrolments();

</script>


</body>
</html>
