<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* BACK BUTTON */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-weight: bold;
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.1);
            padding: 35px;
            border-radius: 15px;
            backdrop-filter: blur(12px);
            color: white;
            width: 320px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        /* INPUT */
        .input-group {
            text-align: left;
            margin-top: 15px;
        }

        label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 6px;
        }

        /* BUTTON */
        .login-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #3a8dde;
        }

        /* FOOTER */
        .footer {
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="goBack()">← Back</button>

<div class="card">
    <h2>Welcome Student 🎓</h2>
    <p>Login to continue</p>

    <div class="input-group">
        <label>Email</label>
        <input id="email" type="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter your password">
    </div>

    <button class="login-btn" onclick="login()">Login</button>

    <div class="footer">
        Don't have an account? <a href="register.html" style="color:#fff;">Register</a>
    </div>
</div>

<script>
    function goBack() {
        window.location.href = "index.html";
    }

    function login() {
        fetch("http://localhost:8080/api/students/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                email: email.value,
                password: password.value
            })
        })
        .then(res => {
            if (!res.ok) throw new Error();
            return res.json();
        })
        .then(data => {
            localStorage.setItem("user", JSON.stringify(data));
            if (data.role === "ADMIN") {
                window.location.href = "admin.html";
            } else {
                window.location.href = "dashboard.html";
            }
        })
        .catch(() => alert("Invalid login"));
    }
</script>

</body>
</html>
