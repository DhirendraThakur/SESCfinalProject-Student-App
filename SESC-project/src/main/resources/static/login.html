<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin:0;
            font-family:Arial;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#667eea,#764ba2);
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding:30px;
            border-radius:15px;
            backdrop-filter: blur(10px);
            color:white;
            width:300px;
            text-align:center;
        }

        input {
            width:100%;
            padding:10px;
            margin:10px 0;
            border:none;
            border-radius:5px;
        }

        button {
            width:100%;
            padding:10px;
            background:#4facfe;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover {
            background:#3a8dde;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
    function login(){
    fetch("http://localhost:8080/api/students/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
    email:email.value,
    password:password.value
    })
    })
    .then(res=>{
    if(!res.ok) throw new Error();
    return res.json();
    })
    .then(data=>{
    localStorage.setItem("user",JSON.stringify(data));
    window.location.href="dashboard.html";
    })
    .catch(()=>alert("Invalid login"));
    }
</script>

</body>
</html>
