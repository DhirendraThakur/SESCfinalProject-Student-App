<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>

    <style>
        body {
            margin:0;
            font-family: Arial;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color:white;
        }

        .container {
            text-align:center;
        }

        h1 {
            font-size:40px;
        }

        button {
            padding:12px 25px;
            margin:10px;
            border:none;
            border-radius:25px;
            background:white;
            color:#4facfe;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover {
            transform:scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">
    <h1> Student Portal</h1>
    <p>Manage your academic journey easily</p>

    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</div>

<script>
    function login(){ window.location.href="login.html"; }
    function register(){ window.location.href="register.html"; }
</script>

</body>
</html>
