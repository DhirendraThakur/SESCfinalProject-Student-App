<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f9;
        }

        /* NAVBAR */
        .navbar {
            background: #4facfe;
            padding: 15px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-menu {
            position: relative;
            cursor: pointer;
        }

        .dropdown {
            position: absolute;
            right: 0;
            top: 35px;
            background: white;
            width: 150px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
        }

        .dropdown a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: black;
        }

        .dropdown a:hover {
            background: #f0f0f0;
        }

        /* LAYOUT */
        .container {
            display: flex;
            justify-content: space-between;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        /* RIGHT SIDE */
        .right-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .service-card {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .service-card button {
            margin-top: 10px;
            padding: 8px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        /* MODAL BASE */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            padding: 20px;
            width: 320px;
            margin: 8% auto;
            border-radius: 10px;
            position: relative;
            animation: slideDown 0.3s ease;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 22px;
            cursor: pointer;
            color: red;
        }

        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            margin-top: 10px;
        }

        /* COURSES & ENROLMENTS */
        .full-width-section {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .course-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            background: #fafafa;
        }
        .course-card h4 { margin: 0 0 10px 0; color: #4facfe; }
        .course-card p { margin: 5px 0; font-size: 14px; }
        .enrol-btn { background: #28a745; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .enrol-btn[disabled] { background: #ccc; cursor: not-allowed; }

        /* ANIMATION */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideDown {
            from {transform: translateY(-50px); opacity:0;}
            to {transform: translateY(0); opacity:1;}
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h3>Student Dashboard</h3>

    <div class="user-menu" onclick="toggleMenu()">
        <i class="fa-solid fa-user-circle"></i>

        <div class="dropdown" id="dropdown">
            <a href="#" onclick="updateUser()">Update</a>
            <a href="#" onclick="deleteUser()">Delete</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>
</div>

<!-- CONTENT -->
<div class="container">

    <div class="card">
        <h3 id="name"></h3>
        <p id="email"></p>
        <p id="phone"></p>
        <p id="address"></p>
    </div>

    <div class="right-section">
        <div class="service-card">
            <h4>Finance Service</h4>
            <button onclick="finance()">Open</button>
        </div>

        <div class="service-card">
            <h4>Library Service</h4>
            <button onclick="library()">Open</button>
        </div>

        <div class="service-card">
            <h4>More Details</h4>
            <button onclick="details()">Open</button>
        </div>
    </div>

</div>

<!-- NEW SECTIONS FOR COURSES AND ENROLMENTS -->
<div style="padding: 0 30px 30px;">
    <div class="full-width-section">
        <h3>My Enrolments</h3>
        <div class="grid" id="enrolmentsGrid">
            <p>Loading your enrolments...</p>
        </div>
    </div>

    <div class="full-width-section">
        <h3>Available Courses</h3>
        <div class="grid" id="coursesGrid">
            <p>Loading courses...</p>
        </div>
    </div>
</div>

<!-- UPDATE MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>

        <h3>Update Profile</h3>

        <label>Name</label>
        <input id="newName">

        <label>Email</label>
        <input id="newEmail">

        <label>Phone</label>
        <input id="newPhone">

        <label>Address</label>
        <input id="newAddress">

        <button onclick="saveUpdate()">Save</button>
    </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeProfile()">&times;</span>

        <h3>My Profile</h3>

        <p><b>Name:</b> <span id="pName"></span></p>
        <p><b>Email:</b> <span id="pEmail"></span></p>
        <p><b>Phone:</b> <span id="pPhone"></span></p>
        <p><b>Address:</b> <span id="pAddress"></span></p>

        <button onclick="openEdit()">Edit Profile</button>
    </div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        window.location.href = "login.html";
    }

    // display user
    name.innerText = user.name;
    email.innerText = user.email;
    phone.innerText = user.phone;
    address.innerText = user.address;

    // dropdown
    function toggleMenu() {
        dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
    }

    // logout
    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    // open update
    function updateUser() {
        modal.style.display = "block";

        newName.value = user.name;
        newEmail.value = user.email;
        newPhone.value = user.phone;
        newAddress.value = user.address;
    }

    // close update
    function closeModal() {
        modal.style.display = "none";
    }

    // save update
    function saveUpdate() {
        const updated = {
            name: newName.value,
            email: newEmail.value,
            phone: newPhone.value,
            address: newAddress.value
        };

        fetch(`/api/students/${user.id}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(updated)
        })
        .then(res => res.json())
        .then(data => {
            localStorage.setItem("user", JSON.stringify(data));
            alert("Updated!");
            location.reload();
        });
    }

    // delete
    function deleteUser() {
        if (confirm("Delete account?")) {
            fetch(`/api/students/${user.id}`, {
                method: "DELETE"
            }).then(() => {
                localStorage.clear();
                window.location.href = "register.html";
            });
        }
    }

    // services
    function finance() { alert("Finance coming soon"); }
    function library() { window.location.href = "library.html"; }

    // --- COURSES & ENROLMENTS LOGIC ---
    let myEnrolledCourseIds = [];

    async function loadEnrolments() {
        try {
            const res = await fetch(`/api/enrolments/${user.id}`);
            const grid = document.getElementById('enrolmentsGrid');
            
            if (!res.ok) {
                grid.innerHTML = "<p>Error loading enrolments.</p>";
                return;
            }
            const enrolments = await res.json();
            
            myEnrolledCourseIds = enrolments.map(e => e.course.id);
            
            if (enrolments.length === 0) {
                grid.innerHTML = "<p>You are not enrolled in any courses yet.</p>";
            } else {
                grid.innerHTML = "";
                enrolments.forEach(e => {
                    const card = document.createElement('div');
                    card.className = 'course-card';
                    const title = document.createElement('h4');
                    title.textContent = e.course.title;
                    const description = document.createElement('p');
                    description.textContent = e.course.description;
                    const creditsDuration = document.createElement('p');
                    const creditsLabel = document.createElement('b');
                    creditsLabel.textContent = 'Credits:';
                    creditsDuration.appendChild(creditsLabel);
                    creditsDuration.appendChild(document.createTextNode(` ${e.course.credits} | `));
                    const durationLabel = document.createElement('b');
                    durationLabel.textContent = 'Duration:';
                    creditsDuration.appendChild(durationLabel);
                    creditsDuration.appendChild(document.createTextNode(` ${e.course.duration} weeks`));
                    const status = document.createElement('p');
                    const statusLabel = document.createElement('b');
                    statusLabel.textContent = 'Status:';
                    status.appendChild(statusLabel);
                    status.appendChild(document.createTextNode(` ${e.status}`));
                    const enrolled = document.createElement('p');
                    const enrolledLabel = document.createElement('b');
                    enrolledLabel.textContent = 'Enrolled:';
                    enrolled.appendChild(enrolledLabel);
                    enrolled.appendChild(document.createTextNode(` ${new Date(e.enrolledAt).toLocaleDateString()}`));
                    card.appendChild(title);
                    card.appendChild(description);
                    card.appendChild(creditsDuration);
                    card.appendChild(status);
                    card.appendChild(enrolled);
                    grid.appendChild(card);
                });
            }
        } catch (err) {
            console.error("Error loading enrolments", err);
        } finally {
            loadCourses(); // Load courses even if enrolments fail
        }
    }

    async function loadCourses() {
        try {
            const res = await fetch(`/api/courses`);
            const grid = document.getElementById('coursesGrid');
            
            if (!res.ok) {
                grid.innerHTML = "<p>Error loading courses.</p>";
                return;
            }
            const courses = await res.json();
            
            if (courses.length === 0) {
                grid.innerHTML = "<p>No courses available.</p>";
            } else {
                grid.innerHTML = "";
                courses.forEach(c => {
                    const isEnrolled = myEnrolledCourseIds.includes(c.id);
                    const card = document.createElement('div');
                    card.className = 'course-card';
                    const title = document.createElement('h4');
                    title.textContent = c.title;
                    const description = document.createElement('p');
                    description.textContent = c.description;
                    const creditsDuration = document.createElement('p');
                    const creditsLabel = document.createElement('b');
                    creditsLabel.textContent = 'Credits:';
                    creditsDuration.appendChild(creditsLabel);
                    creditsDuration.appendChild(document.createTextNode(` ${c.credits} | `));
                    const durationLabel = document.createElement('b');
                    durationLabel.textContent = 'Duration:';
                    creditsDuration.appendChild(durationLabel);
                    creditsDuration.appendChild(document.createTextNode(` ${c.duration} weeks`));
                    
                    const btn = document.createElement('button');
                    btn.className = 'enrol-btn';
                    btn.textContent = isEnrolled ? 'Enrolled' : 'Enrol Now';
                    if (isEnrolled) {
                        btn.disabled = true;
                    } else {
                        btn.onclick = () => enrol(c.id);
                    }

                    card.appendChild(title);
                    card.appendChild(description);
                    card.appendChild(creditsDuration);
                    card.appendChild(btn);
                    grid.appendChild(card);
                });
            }
        } catch (err) {
            console.error("Error loading courses", err);
        }
    }

    async function enrol(courseId) {
        try {
            const payload = { studentId: user.id, courseId: courseId };
            const res = await fetch(`/api/enrolments`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payload)
            });
            
            if (res.ok) {
                alert("Successfully enrolled!");
                loadEnrolments(); // Refresh lists
            } else {
                alert("Failed to enrol.");
            }
        } catch (err) {
            console.error("Error enrolling", err);
        }
    }

    // Load data on start
    if (user) {
        loadEnrolments();
    }
    // ----------------------------------

    // PROFILE MODAL
    function details() {
        profileModal.style.display = "block";

        pName.innerText = user.name;
        pEmail.innerText = user.email;
        pPhone.innerText = user.phone;
        pAddress.innerText = user.address;
    }

    function closeProfile() {
        profileModal.style.display = "none";
    }

    function openEdit() {
        closeProfile();
        updateUser();
    }

    // outside click
    window.onclick = function(e) {
        if (!e.target.closest('.user-menu')) {
            dropdown.style.display = "none";
        }

        if (e.target === modal) closeModal();
        if (e.target === profileModal) closeProfile();
    }
</script>

</body>
</html>
