<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 430px;
            background: white;
            padding: 38px;
            border-radius: 28px;
            box-shadow: 0 24px 55px rgba(15,23,42,0.18);
            text-align: center;
        }

        .logo {
            width: 76px;
            height: 76px;
            margin: 0 auto 18px;
            border-radius: 22px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
        }

        h1 {
            color: #0f172a;
            margin-bottom: 10px;
        }

        p {
            color: #64748b;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 9px 0;
            border: 1px solid #dbe4f0;
            border-radius: 14px;
            outline: none;
            font-size: 15px;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            margin-top: 13px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 15px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
        }

        .btn-dark {
            background: #0f172a;
        }

        .btn-gray {
            background: #64748b;
        }

        .error {
            color: #dc2626;
            font-size: 14px;
            margin-top: 12px;
            min-height: 18px;
        }

        .hidden {
            display: none;
        }

        .footer {
            margin-top: 25px;
            color: #94a3b8;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container" id="main">
    <div class="logo">📚</div>
    <h1>Library Service</h1>
    <p>Secure library access for students and administrators.</p>

    <button class="btn" onclick="showStudentLogin()">Student Login</button>
    <button class="btn btn-dark" onclick="showAdminLogin()">Admin Login</button>

    <div class="footer">Smart Campus Library Portal</div>
</div>

<div class="container hidden" id="studentLogin">
    <div class="logo">🎓</div>
    <h1>Student Login</h1>
    <p>Enter your Student ID to continue.</p>

    <input type="text" id="studentId" placeholder="Enter Student ID">

    <button class="btn" onclick="studentLogin()">Login</button>
    <button class="btn btn-gray" onclick="showMain()">Back</button>

    <div class="error" id="studentError"></div>
</div>

<div class="container hidden" id="adminLogin">
    <div class="logo">🛡️</div>
    <h1>Admin Login</h1>
    <p>Use your Student Service admin email and password.</p>

    <input type="email" id="adminUsername" placeholder="Admin Email">
    <input type="password" id="adminPassword" placeholder="Password">

    <button class="btn btn-dark" onclick="adminLogin()">Login as Admin</button>
    <button class="btn btn-gray" onclick="showMain()">Back</button>

    <div class="error" id="adminError"></div>
</div>

<script>
    function showMain() {
        document.getElementById("main").classList.remove("hidden");
        document.getElementById("studentLogin").classList.add("hidden");
        document.getElementById("adminLogin").classList.add("hidden");
    }

    function showStudentLogin() {
        document.getElementById("main").classList.add("hidden");
        document.getElementById("studentLogin").classList.remove("hidden");
        document.getElementById("adminLogin").classList.add("hidden");
    }

    function showAdminLogin() {
        document.getElementById("main").classList.add("hidden");
        document.getElementById("studentLogin").classList.add("hidden");
        document.getElementById("adminLogin").classList.remove("hidden");
    }

    async function studentLogin() {
        const id = document.getElementById("studentId").value.trim();
        const error = document.getElementById("studentError");

        error.innerText = "";

        if (!id) {
            error.innerText = "Please enter Student ID.";
            return;
        }

        try {
            const res = await fetch("/api/library/accounts/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ studentId: id })
            });

            if (!res.ok) {
                error.innerText = "Student login failed.";
                return;
            }

            localStorage.setItem("libraryStudent", id);
            window.location.href = "student.html";

        } catch (e) {
            error.innerText = "Could not connect to library service.";
        }
    }

    async function adminLogin() {
        const email = document.getElementById("adminUsername").value.trim();
        const password = document.getElementById("adminPassword").value.trim();
        const error = document.getElementById("adminError");

        error.innerText = "";

        if (!email || !password) {
            error.innerText = "Please fill all fields.";
            return;
        }

        try {
            const res = await fetch("http://localhost:8080/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            if (!res.ok) {
                error.innerText = "Invalid admin credentials.";
                return;
            }

            const data = await res.json();

            if (data.role !== "ADMIN") {
                error.innerText = "Access denied. Admin only.";
                return;
            }

            localStorage.setItem("libraryAdminAuth", "true");
            localStorage.setItem("libraryAdminToken", data.token);
            localStorage.setItem("libraryAdminUser", JSON.stringify(data));

            window.location.href = "admin.html";

        } catch (e) {
            error.innerText = "Could not connect to Student Auth Service.";
        }
    }
</script>

</body>
</html>
