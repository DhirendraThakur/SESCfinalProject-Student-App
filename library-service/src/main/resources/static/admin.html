<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #f4f7fb;
            color: #1f2937;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            background: #0f172a;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding: 24px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar button {
            width: 100%;
            padding: 13px;
            margin-bottom: 12px;
            border: none;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            cursor: pointer;
            text-align: left;
            font-weight: bold;
        }

        .sidebar button:hover,
        .sidebar button.active {
            background: linear-gradient(135deg, #2563eb, #06b6d4);
        }

        .logout-btn {
            background: #dc2626 !important;
            margin-top: 30px;
        }

        .main {
            margin-left: 260px;
            padding: 30px;
        }

        .topbar {
            background: white;
            padding: 26px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(15,23,42,0.08);
            margin-bottom: 24px;
        }

        .topbar h1 {
            color: #0f172a;
            margin-bottom: 6px;
        }

        .topbar p {
            color: #64748b;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(15,23,42,0.08);
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .section-header h2 {
            color: #0f172a;
        }

        .btn {
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            color: white;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-gray {
            background: #64748b;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #f8fafc;
            color: #334155;
        }

        .badge {
            padding: 6px 10px;
            border-radius: 999px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .AVAILABLE,
        .RETURNED {
            background: #16a34a;
        }

        .ISSUED,
        .BORROWED {
            background: #f59e0b;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.55);
            z-index: 999;
            padding: 20px;
        }

        .modal-content {
            background: white;
            max-width: 460px;
            margin: 7% auto;
            padding: 26px;
            border-radius: 22px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            margin-bottom: 18px;
            color: #0f172a;
        }

        input {
            width: 100%;
            padding: 13px;
            margin-bottom: 12px;
            border: 1px solid #dbe4f0;
            border-radius: 12px;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .table-wrap {
            overflow-x: auto;
        }

        @media (max-width: 800px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main {
                margin-left: 0;
                padding: 18px;
            }
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>📚 Library Admin</h2>

    <button id="booksBtn" class="active" onclick="showSection('books')">Books</button>
    <button id="loansBtn" onclick="showSection('loans')">Loans</button>
    <button id="accountsBtn" onclick="showSection('accounts')">Accounts</button>

    <button class="logout-btn" onclick="adminLogout()">Logout</button>
</div>

<div class="main">
    <div class="topbar">
        <h1>Library Administration</h1>
        <p>Manage books, loans, and library student accounts.</p>
    </div>

    <div id="booksSection" class="card">
        <div class="section-header">
            <div>
                <h2>Books</h2>
                <p>Manage all library books.</p>
            </div>
            <button class="btn btn-primary" onclick="openBookModal()">+ Add Book</button>
        </div>

        <div class="table-wrap">
            <table id="bookTable"></table>
        </div>
    </div>

    <div id="loansSection" class="card" style="display:none;">
        <div class="section-header">
            <div>
                <h2>Loans</h2>
                <p>View current and past book loans.</p>
            </div>
            <button class="btn btn-primary" onclick="loadLoans()">Refresh</button>
        </div>

        <div class="table-wrap">
            <table id="loanTable"></table>
        </div>
    </div>

    <div id="accountsSection" class="card" style="display:none;">
        <div class="section-header">
            <div>
                <h2>Library Accounts</h2>
                <p>View registered library student accounts.</p>
            </div>
            <button class="btn btn-primary" onclick="loadAccounts()">Refresh</button>
        </div>

        <div class="table-wrap">
            <table id="accountTable"></table>
        </div>
    </div>
</div>

<div class="modal" id="bookModal">
    <div class="modal-content">
        <h3 id="bookModalTitle">Add Book</h3>

        <input id="bookTitle" placeholder="Book Title">
        <input id="bookAuthor" placeholder="Author">
        <input id="bookCopies" type="number" placeholder="Total Copies">

        <div class="actions">
            <button class="btn btn-primary" onclick="saveBook()">Save</button>
            <button class="btn btn-gray" onclick="closeBookModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    if (localStorage.getItem("libraryAdminAuth") !== "true") {
        alert("Admin access required.");
        window.location.href = "index.html";
    }

    let editingBookId = null;

    function authHeaders() {
        return {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("libraryAdminToken")
        };
    }

    function adminLogout() {
        localStorage.removeItem("libraryAdminAuth");
        localStorage.removeItem("libraryAdminToken");
        localStorage.removeItem("libraryAdminUser");
        window.location.href = "index.html";
    }

    function showSection(section) {
        document.getElementById("booksSection").style.display = "none";
        document.getElementById("loansSection").style.display = "none";
        document.getElementById("accountsSection").style.display = "none";

        document.getElementById("booksBtn").classList.remove("active");
        document.getElementById("loansBtn").classList.remove("active");
        document.getElementById("accountsBtn").classList.remove("active");

        document.getElementById(section + "Section").style.display = "block";
        document.getElementById(section + "Btn").classList.add("active");

        if (section === "books") loadBooks();
        if (section === "loans") loadLoans();
        if (section === "accounts") loadAccounts();
    }

    function safe(value, fallback = "-") {
        return value && String(value).trim() !== "" ? value : fallback;
    }

    function escapeValue(value) {
        return String(value || "").replace(/'/g, "\\'").replace(/"/g, "&quot;");
    }

    async function loadBooks() {
        const table = document.getElementById("bookTable");

        try {
            const res = await fetch("/api/library/books");
            const books = await res.json();

            table.innerHTML = `
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Total Copies</th>
                    <th>Available Copies</th>
                    <th>Action</th>
                </tr>
            `;

            if (!books.length) {
                table.innerHTML += `<tr><td colspan="5">No books found.</td></tr>`;
                return;
            }

            books.forEach(book => {
                table.innerHTML += `
                    <tr>
                        <td>${safe(book.title)}</td>
                        <td>${safe(book.author)}</td>
                        <td>${safe(book.totalCopies, 0)}</td>
                        <td>${safe(book.availableCopies, 0)}</td>
                        <td>
                            <button class="btn btn-warning" onclick="editBook('${book.id}', '${escapeValue(book.title)}', '${escapeValue(book.author)}', ${book.totalCopies || 0})">Edit</button>
                            <button class="btn btn-danger" onclick="deleteBook('${book.id}')">Delete</button>
                        </td>
                    </tr>
                `;
            });

        } catch (e) {
            table.innerHTML = `<tr><td colspan="5">Could not load books.</td></tr>`;
        }
    }

    function openBookModal() {
        editingBookId = null;
        document.getElementById("bookModalTitle").innerText = "Add Book";
        document.getElementById("bookTitle").value = "";
        document.getElementById("bookAuthor").value = "";
        document.getElementById("bookCopies").value = "";
        document.getElementById("bookModal").style.display = "block";
    }

    function closeBookModal() {
        document.getElementById("bookModal").style.display = "none";
    }

    function editBook(id, title, author, copies) {
        editingBookId = id;
        document.getElementById("bookModalTitle").innerText = "Edit Book";
        document.getElementById("bookTitle").value = title;
        document.getElementById("bookAuthor").value = author;
        document.getElementById("bookCopies").value = copies;
        document.getElementById("bookModal").style.display = "block";
    }

    async function saveBook() {
        const title = document.getElementById("bookTitle").value.trim();
        const author = document.getElementById("bookAuthor").value.trim();
        const totalCopies = parseInt(document.getElementById("bookCopies").value) || 1;

        if (!title || !author) {
            alert("Please enter title and author.");
            return;
        }

        const body = JSON.stringify({
            title,
            author,
            totalCopies,
            availableCopies: totalCopies
        });

        try {
            if (editingBookId) {
                await fetch(`/api/library/books/${editingBookId}`, {
                    method: "PUT",
                    headers: authHeaders(),
                    body
                });
            } else {
                await fetch("/api/library/books", {
                    method: "POST",
                    headers: authHeaders(),
                    body
                });
            }

            closeBookModal();
            loadBooks();

        } catch (e) {
            alert("Could not save book.");
        }
    }

    async function deleteBook(id) {
        if (!confirm("Delete this book?")) return;

        try {
            await fetch(`/api/library/books/${id}`, {
                method: "DELETE",
                headers: authHeaders()
            });

            loadBooks();

        } catch (e) {
            alert("Could not delete book.");
        }
    }

    async function loadLoans() {
        const table = document.getElementById("loanTable");

        try {
            const res = await fetch("/api/library/loans/current");
            const loans = await res.json();

            table.innerHTML = `
                <tr>
                    <th>Student ID</th>
                    <th>Book Title</th>
                    <th>Borrowed At</th>
                    <th>Due Date</th>
                    <th>Status</th>
                </tr>
            `;

            if (!loans.length) {
                table.innerHTML += `<tr><td colspan="5">No current loans found.</td></tr>`;
                return;
            }

            loans.forEach(loan => {
                table.innerHTML += `
                    <tr>
                        <td>${safe(loan.studentId)}</td>
                        <td>${safe(loan.bookTitle)}</td>
                        <td>${loan.borrowedAt ? new Date(loan.borrowedAt).toLocaleDateString() : "-"}</td>
                        <td>${loan.dueDate ? new Date(loan.dueDate).toLocaleDateString() : "-"}</td>
                        <td><span class="badge ${loan.status}">${safe(loan.status)}</span></td>
                    </tr>
                `;
            });

        } catch (e) {
            table.innerHTML = `<tr><td colspan="5">Could not load loans.</td></tr>`;
        }
    }

    async function loadAccounts() {
        const table = document.getElementById("accountTable");

        table.innerHTML = `
            <tr>
                <th>Information</th>
            </tr>
            <tr>
                <td>Your current backend may not have a list-all library accounts endpoint. Add GET /api/library/accounts if needed.</td>
            </tr>
        `;
    }

    window.onclick = function(e) {
        const modal = document.getElementById("bookModal");
        if (e.target === modal) {
            closeBookModal();
        }
    };

    loadBooks();
</script>

</body>
</html>
