<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; }
        .navbar { background: #4da6ff; padding: 15px 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .btn-logout { background: transparent; border: 1px solid white; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .container { padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 15px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #4da6ff; color: white; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .btn-return { background: #ff4d4d; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; color: white; }
        .badge.BORROWED { background: orange; }
        .badge.RETURNED { background: green; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Library Portal - <span id="sIdDisplay"></span></h2>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <h3>My Loans</h3>
        <div class="grid" id="loans-grid"></div>

        <h3 style="margin-top: 40px;">Available Books</h3>
        <div class="grid" id="books-grid"></div>
    </div>

    <script>
        const studentId = localStorage.getItem('libraryStudent');
        if (!studentId) window.location.href = 'index.html';
        document.getElementById('sIdDisplay').innerText = studentId;

        function logout() {
            localStorage.removeItem('libraryStudent');
            window.location.href = 'index.html';
        }

        async function loadData() {
            // Load Loans
            const loanRes = await fetch(`/api/library/loans/student/${studentId}`);
            const loans = await loanRes.json();
            const loansGrid = document.getElementById('loans-grid');
            loansGrid.innerHTML = '';
            loans.forEach(loan => {
                const due = new Date(loan.dueDate).toLocaleDateString();
                const borrowed = new Date(loan.borrowedAt).toLocaleDateString();
                let card = `<div class="card">
                    <h4>${loan.bookTitle}</h4>
                    <p><small>Borrowed: ${borrowed} | Due: ${due}</small></p>
                    <span class="badge ${loan.status}">${loan.status}</span>
                `;
                if (loan.status === 'BORROWED') {
                    card += `<br><button class="btn btn-return" onclick="returnBook('${loan.id}')">Return Book</button>`;
                }
                card += `</div>`;
                loansGrid.innerHTML += card;
            });

            // Load Books
            const bookRes = await fetch('/api/library/books/available');
            const books = await bookRes.json();
            const booksGrid = document.getElementById('books-grid');
            booksGrid.innerHTML = '';
            books.forEach(b => {
                booksGrid.innerHTML += `
                    <div class="card">
                        <h4>${b.title}</h4>
                        <p>${b.author}</p>
                        <p><small>Copies available: ${b.availableCopies}</small></p>
                        <button class="btn" onclick="borrowBook('${b.id}')">Borrow</button>
                    </div>
                `;
            });
        }

        async function borrowBook(bookId) {
            const res = await fetch('/api/library/loans/borrow', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bookId, studentId })
            });
            if (res.ok) {
                alert('Book borrowed successfully!');
                loadData();
            } else {
                alert('Failed to borrow book.');
            }
        }

        async function returnBook(loanId) {
            const res = await fetch(`/api/library/loans/return/${loanId}`, { method: 'POST' });
            if (res.ok) {
                alert('Book returned successfully!');
                loadData();
            } else {
                alert('Failed to return book.');
            }
        }

        loadData();
    </script>
</body>
</html>
