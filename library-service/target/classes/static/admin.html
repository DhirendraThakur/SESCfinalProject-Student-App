<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Admin</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f6f9; display: flex; height: 100vh; }
        .sidebar { width: 200px; background: #333; color: white; padding: 20px; }
        .sidebar button { display: block; width: 100%; padding: 10px; margin-bottom: 10px; background: #444; color: white; border: none; cursor: pointer; text-align: left; }
        .sidebar button:hover { background: #555; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f0f0f0; }
        .btn { padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; color: white; }
        .btn-primary { background: #4da6ff; }
        .btn-warning { background: orange; }
        .btn-danger { background: red; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; width: 400px; margin: 100px auto; padding: 20px; border-radius: 5px; }
        .modal-content input { width: 90%; margin-bottom: 15px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .overdue-severe { background-color: #ffcccc; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Admin Panel</h2>
        <button onclick="showSection('books')">Books</button>
        <button onclick="showSection('loans')">Current Loans</button>
        <button onclick="showSection('overdue')">Overdue</button>
        <button onclick="window.location.href='index.html'" style="margin-top: 50px; background: #c0392b;">Logout</button>
    </div>

    <div class="content">

        <!-- BOOKS -->
        <div id="booksSection">
            <h2>Books</h2>
            <button class="btn btn-primary" onclick="openBookModal()">+ Add Book</button>
            <table>
                <thead>
                    <tr><th>ISBN</th><th>Title</th><th>Author</th><th>Total Copies</th><th>Actions</th></tr>
                </thead>
                <tbody id="booksBody"></tbody>
            </table>
        </div>

        <!-- LOANS -->
        <div id="loansSection" style="display: none;">
            <h2>Current Loans</h2>
            <table>
                <thead>
                    <tr><th>Student ID</th><th>Book Title</th><th>Borrowed Date</th><th>Due Date</th></tr>
                </thead>
                <tbody id="loansBody"></tbody>
            </table>
        </div>

        <!-- OVERDUE -->
        <div id="overdueSection" style="display: none;">
            <h2>Overdue Loans</h2>
            <table>
                <thead>
                    <tr><th>Student ID</th><th>Book Title</th><th>Days Overdue</th></tr>
                </thead>
                <tbody id="overdueBody"></tbody>
            </table>
        </div>

    </div>

    <!-- BOOK MODAL -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add Book</h3>
            <input type="hidden" id="bId">
            <label>ISBN:</label>
            <input type="text" id="bIsbn">
            <label>Title:</label>
            <input type="text" id="bTitle">
            <label>Author:</label>
            <input type="text" id="bAuthor">
            <label>Copies:</label>
            <input type="number" id="bCopies">
            
            <div>
                <button class="btn btn-primary" onclick="saveBook()">Save</button>
                <button class="btn btn-warning" onclick="closeBookModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        function showSection(id) {
            document.getElementById('booksSection').style.display = 'none';
            document.getElementById('loansSection').style.display = 'none';
            document.getElementById('overdueSection').style.display = 'none';
            document.getElementById(id + 'Section').style.display = 'block';

            if (id === 'books') loadBooks();
            if (id === 'loans') loadLoans();
            if (id === 'overdue') loadOverdue();
        }

        async function loadBooks() {
            const res = await fetch('/api/library/books');
            const books = await res.json();
            const tbody = document.getElementById('booksBody');
            tbody.innerHTML = '';
            books.forEach(b => {
                tbody.innerHTML += `<tr>
                    <td>${b.isbn}</td>
                    <td>${b.title}</td>
                    <td>${b.author}</td>
                    <td>${b.copies}</td>
                    <td>
                        <button class="btn btn-warning" onclick="editBook('${b.id}', '${b.isbn}', '${b.title.replace(/'/g, "\\'")}', '${b.author.replace(/'/g, "\\'")}', ${b.copies})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteBook('${b.id}')">Delete</button>
                    </td>
                </tr>`;
            });
        }

        async function loadLoans() {
            const res = await fetch('/api/library/loans/current');
            const loans = await res.json();
            const tbody = document.getElementById('loansBody');
            tbody.innerHTML = '';
            loans.forEach(l => {
                const borrowed = new Date(l.borrowedAt).toLocaleDateString();
                const due = new Date(l.dueDate).toLocaleDateString();
                tbody.innerHTML += `<tr>
                    <td>${l.studentId}</td>
                    <td>${l.bookTitle}</td>
                    <td>${borrowed}</td>
                    <td>${due}</td>
                </tr>`;
            });
        }

        async function loadOverdue() {
            const res = await fetch('/api/library/loans/overdue');
            const loans = await res.json();
            const tbody = document.getElementById('overdueBody');
            tbody.innerHTML = '';
            const today = new Date();
            loans.forEach(l => {
                const due = new Date(l.dueDate);
                const diffTime = today - due;
                const daysOverdue = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                const highlightClass = daysOverdue > 7 ? 'overdue-severe' : '';
                tbody.innerHTML += `<tr class="${highlightClass}">
                    <td>${l.studentId}</td>
                    <td>${l.bookTitle}</td>
                    <td>${daysOverdue} days</td>
                </tr>`;
            });
        }

        function openBookModal() {
            document.getElementById('modalTitle').innerText = 'Add Book';
            document.getElementById('bId').value = '';
            document.getElementById('bIsbn').value = '';
            document.getElementById('bTitle').value = '';
            document.getElementById('bAuthor').value = '';
            document.getElementById('bCopies').value = '';
            document.getElementById('bookModal').style.display = 'block';
        }

        function editBook(id, isbn, title, author, copies) {
            document.getElementById('modalTitle').innerText = 'Edit Book';
            document.getElementById('bId').value = id;
            document.getElementById('bIsbn').value = isbn;
            document.getElementById('bTitle').value = title;
            document.getElementById('bAuthor').value = author;
            document.getElementById('bCopies').value = copies;
            document.getElementById('bookModal').style.display = 'block';
        }

        function closeBookModal() {
            document.getElementById('bookModal').style.display = 'none';
        }

        async function saveBook() {
            const id = document.getElementById('bId').value;
            const payload = {
                isbn: document.getElementById('bIsbn').value,
                title: document.getElementById('bTitle').value,
                author: document.getElementById('bAuthor').value,
                copies: parseInt(document.getElementById('bCopies').value)
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/library/books/${id}` : '/api/library/books';

            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                closeBookModal();
                loadBooks();
            } else {
                alert('Error saving book');
            }
        }

        async function deleteBook(id) {
            if (!confirm('Are you sure?')) return;
            const res = await fetch(`/api/library/books/${id}`, { method: 'DELETE' });
            if (res.ok) loadBooks();
        }

        // Init
        showSection('books');
    </script>
</body>
</html>
